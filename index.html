<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>클래스어라운드 카카오톡 입장자 체크봇</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>클래스어라운드 카카오톡 입장자 체크봇</h1>
        <p class="subtext">탭 검색 · 다중 로그 업로드 · 패널 추가 지원</p>
      </div>
      <div class="topbar-actions">
        <button id="loginBtn" class="btn btn-primary" type="button">Google 로그인</button>
        <button id="logoutBtn" class="btn" type="button">로그아웃</button>
      </div>
    </header>

    <section class="card info-card compact-info-card">
      <div class="status-row">
        <span id="authState" class="status-pill warn">로그인 준비 중...</span>
        <span id="tabState" class="status-pill">탭 목록 미로드</span>
      </div>
      <div id="authErr" class="error-box"></div>
    </section>

    <section class="card toolbar-card">
      <div class="toolbar-row">
        <button id="refreshTabsBtn" class="btn" type="button">탭 목록 새로고침</button>
        <button id="addPanelBtn" class="btn btn-primary" type="button">패널 추가</button>
      </div>
      <p class="hint">
        각 패널은 서로 다른 탭을 선택해서 독립적으로 체크할 수 있습니다. 여러 txt/csv 로그 파일도 한 번에 넣을 수 있습니다.
      </p>
    </section>

    <main id="panelsRoot" class="panels-root"></main>
  </div>

  <template id="panelTemplate">
    <section class="card panel-card">
      <div class="panel-head">
        <div>
          <h2 class="panel-title">패널</h2>
          <p class="panel-subtitle">선택한 탭의 C/D를 읽고 M열에 입장 체크</p>
        </div>
        <button class="btn btn-danger panel-remove-btn" type="button">패널 삭제</button>
      </div>

      <div class="panel-grid">
        <div class="field-block field-span-2">
          <label>탭 검색</label>
          <input class="input js-sheet-search" type="text" placeholder="탭 이름 검색" />
        </div>
        <div class="field-block">
          <label>탭 선택</label>
          <select class="input js-sheet-select"></select>
        </div>
        <div class="field-block field-span-2">
          <label>카톡 대화로그 업로드</label>
          <input class="input js-file-input" type="file" accept=".txt,.csv" multiple />
        </div>
        <div class="field-block">
          <label>업로드 상태</label>
          <div class="file-summary js-file-summary">파일 없음</div>
        </div>
      </div>

      <div class="panel-actions">
        <label class="check-row">
          <input class="js-preview-only" type="checkbox" />
          <span>열람용(시트 미기록)</span>
        </label>
        <button class="btn btn-primary js-run-btn" type="button">실행</button>
        <button class="btn js-demo-btn" type="button">데모</button>
      </div>

      <div class="panel-meta">
        <span class="status-pill js-panel-status">대기 중</span>
      </div>
      <div class="error-box js-panel-error"></div>
      <div class="panel-results js-panel-results"></div>
    </section>
  </template>

  <script src="./js/config.js"></script>
  <script src="./js/utils.js"></script>
  <script src="./js/parser.js"></script>
  <script src="./js/matcher.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/sheets.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
