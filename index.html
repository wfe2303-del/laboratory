<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>타이탄 출석부</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <section id="loginScreen" class="login-screen">
    <div class="login-stage">
      <div class="login-copy">
        <span class="eyebrow">TITAN EDUCATION GROUP</span>
        <button id="loginBtn" class="btn btn-primary login-google-btn" type="button">Google 계정으로 로그인</button>
        <div id="authErr" class="auth-error"></div>
      </div>
      <div class="login-visual">
        <img class="login-logo" src="./assets/classaround-logo.png" alt="Titan" />
      </div>
    </div>
  </section>

  <div id="appShell" class="app-shell hidden">
    <header class="site-nav">
      <div class="nav-brand">
        <img class="nav-logo" src="./assets/classaround-logo.png" alt="Titan" />
      </div>
      <div class="nav-actions">
        <span id="topbarUser" class="nav-user hidden"></span>
        <button id="logoutBtn" class="btn btn-ghost" type="button">로그아웃</button>
      </div>
    </header>

    <section class="workspace-hero">
      <div class="hero-copy">
        <span class="eyebrow">ATTENDANCE WORKSPACE</span>
        <h1 class="hero-title">출석부</h1>
        <p class="hero-desc">선택한 탭 기준으로 카카오톡 입장 로그를 빠르게 확인하고 기록합니다.</p>
      </div>
      <div class="hero-actions">
        <button id="refreshTabsBtn" class="btn btn-ghost" type="button">탭 목록 새로고침</button>
        <button id="addPanelBtn" class="btn btn-primary" type="button">패널 추가</button>
      </div>
    </section>

    <main id="panelsRoot" class="panels-root"></main>
  </div>

  <template id="panelTemplate">
    <section class="panel-card card">
      <div class="panel-head">
        <div class="panel-heading-wrap">
          <span class="panel-kicker">Sheet Workspace</span>
          <h2 class="panel-title"></h2>
        </div>
        <button class="btn btn-ghost btn-danger panel-remove-btn" type="button">패널 삭제</button>
      </div>

      <div class="panel-summary-grid">
        <div class="summary-box">
          <span class="summary-label">선택된 탭</span>
          <strong class="summary-value js-selected-sheet">탭 미선택</strong>
        </div>
        <div class="summary-box">
          <span class="summary-label">로그 파일</span>
          <strong class="summary-value js-file-summary">파일 없음</strong>
        </div>
      </div>

      <div class="panel-button-grid">
        <button class="btn btn-ghost btn-wide js-open-sheet-modal-btn" type="button">탭 선택</button>
        <button class="btn btn-ghost btn-wide js-open-file-modal-btn" type="button">로그 파일 관리</button>
      </div>

      <input class="js-file-input sr-only" type="file" accept=".txt,.csv" multiple />

      <div class="panel-actions">
        <label class="check-row">
          <input class="js-preview-only" type="checkbox" />
          <span>열람용</span>
        </label>
        <div class="panel-action-buttons">
          <button class="btn btn-primary js-run-btn" type="button">실행</button>
          <button class="btn btn-ghost js-demo-btn" type="button">데모</button>
        </div>
      </div>

      <div class="panel-meta hidden">
        <span class="status-pill js-panel-status"></span>
      </div>
      <div class="error-box js-panel-error"></div>
      <div class="panel-results js-panel-results"></div>
    </section>
  </template>

  <div id="modalOverlay" class="modal-overlay hidden" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <div>
          <h3 id="modalTitle" class="modal-title"></h3>
          <p id="modalSubtitle" class="modal-subtitle"></p>
        </div>
        <button id="modalCloseBtn" class="btn btn-ghost" type="button">닫기</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

  <script src="./js/config.js"></script>
  <script src="./js/utils.js"></script>
  <script src="./js/parser.js"></script>
  <script src="./js/matcher.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/sheets.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
